<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>랜딩페이지 댓글</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f8;
      color: #111;
      line-height: 1.5;
    }
    .wrap {
      max-width: 720px;
      margin: 60px auto;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    h1, h2 {
      margin-top: 0;
    }
    .section-gap {
      margin-top: 32px;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d8d8dd;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }
    input:focus, textarea:focus {
      border-color: #333;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      background: #111;
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .muted {
      color: #666;
      font-size: 14px;
    }
    .error {
      color: #c62828;
      font-size: 14px;
      margin-top: 10px;
    }
    .success {
      color: #1b5e20;
      font-size: 14px;
      margin-top: 10px;
    }
    .comment-list {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }
    .comment-item {
      background: #fafafa;
      border: 1px solid #ececf1;
      border-radius: 12px;
      padding: 16px;
    }
    .comment-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }
    .nickname {
      font-weight: 700;
    }
    .date {
      font-size: 12px;
      color: #777;
      white-space: nowrap;
    }
    .content {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
    }
    .empty {
      padding: 20px;
      text-align: center;
      background: #fafafa;
      border: 1px dashed #d8d8dd;
      border-radius: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>댓글 남기기</h1>
      <p class="muted">방문한 느낌이나 의견을 자유롭게 남겨주세요.</p>

      <form id="commentForm">
        <div class="field">
          <label for="nickname">닉네임</label>
          <input
            type="text"
            id="nickname"
            name="nickname"
            maxlength="30"
            placeholder="예: Jason"
            required
          />
        </div>

        <div class="field">
          <label for="content">댓글</label>
          <textarea
            id="content"
            name="content"
            maxlength="500"
            placeholder="댓글을 입력해주세요."
            required
          ></textarea>
        </div>

        <div class="row">
          <button type="submit" id="submitBtn">댓글 등록</button>
          <button type="button" id="refreshBtn">새로고침</button>
          <span class="muted" id="countText">댓글 0개</span>
        </div>

        <div id="formMessage"></div>
      </form>

      <div class="section-gap">
        <h2>댓글 목록</h2>
        <div id="commentList" class="comment-list"></div>
      </div>
    </div>
  </div>

  <!-- Supabase JS v2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 1) Supabase 연결 정보
    const SUPABASE_URL = "https://gvidibcnpilozkrqwdzk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2aWRpYmNucGlsb3prcnF3ZHprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDk2MzcsImV4cCI6MjA4OTkyNTYzN30.qMjODOYJApfT8EGJTckobAozUzoOE2sDBDUCFOwFl2E";

    // 브라우저 전역 객체에서 createClient 사용
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 2) DOM
    const commentForm = document.getElementById("commentForm");
    const nicknameInput = document.getElementById("nickname");
    const contentInput = document.getElementById("content");
    const submitBtn = document.getElementById("submitBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const commentList = document.getElementById("commentList");
    const formMessage = document.getElementById("formMessage");
    const countText = document.getElementById("countText");

    // 3) 유틸
    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return new Intl.DateTimeFormat("ko-KR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function showMessage(message, type = "error") {
      formMessage.className = type;
      formMessage.textContent = message;
    }

    function clearMessage() {
      formMessage.className = "";
      formMessage.textContent = "";
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      refreshBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? "등록 중..." : "댓글 등록";
    }

    // 4) 댓글 렌더링
    function renderComments(comments) {
      countText.textContent = `댓글 ${comments.length}개`;

      if (!comments.length) {
        commentList.innerHTML = '<div class="empty">아직 댓글이 없습니다. 첫 댓글을 남겨보세요.</div>';
        return;
      }

      commentList.innerHTML = comments.map(comment => `
        <div class="comment-item">
          <div class="comment-top">
            <div class="nickname">${escapeHtml(comment.nickname)}</div>
            <div class="date">${formatDate(comment.created_at)}</div>
          </div>
          <div class="content">${escapeHtml(comment.content)}</div>
        </div>
      `).join("");
    }

    // 5) 댓글 불러오기
    async function loadComments() {
      clearMessage();

      const { data, error } = await supabaseClient
        .from("comments")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error("댓글 조회 오류:", error);
        commentList.innerHTML = '<div class="empty">댓글을 불러오지 못했습니다.</div>';
        countText.textContent = "댓글 0개";
        return;
      }

      renderComments(data || []);
    }

    // 6) 댓글 등록
    async function insertComment(event) {
      event.preventDefault();
      clearMessage();

      const nickname = nicknameInput.value.trim();
      const content = contentInput.value.trim();

      if (!nickname) {
        showMessage("닉네임을 입력해주세요.");
        nicknameInput.focus();
        return;
      }

      if (!content) {
        showMessage("댓글 내용을 입력해주세요.");
        contentInput.focus();
        return;
      }

      if (nickname.length > 30) {
        showMessage("닉네임은 30자 이하로 입력해주세요.");
        return;
      }

      if (content.length > 500) {
        showMessage("댓글은 500자 이하로 입력해주세요.");
        return;
      }

      setLoading(true);

      const { error } = await supabaseClient
        .from("comments")
        .insert([
          {
            nickname,
            content
          }
        ]);

      setLoading(false);

      if (error) {
        console.error("댓글 등록 오류:", error);
        showMessage("댓글 등록에 실패했습니다. 테이블/RLS 설정을 다시 확인해주세요.");
        return;
      }

      commentForm.reset();
      showMessage("댓글이 등록되었습니다.", "success");
      await loadComments();
    }

    // 7) 이벤트 연결
    commentForm.addEventListener("submit", insertComment);
    refreshBtn.addEventListener("click", loadComments);

    // 8) 최초 로딩
    loadComments();
  </script>
</body>
</html>
